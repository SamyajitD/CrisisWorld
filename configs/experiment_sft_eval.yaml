# Full SFT evaluation: compare all agent families
# Run with: python -m CrisisWorld.inference --experiment configs/experiment_sft_eval.yaml

seeds: [42, 43, 44]

conditions:
  - flat-lite          # heuristic baseline (low budget)
  - flat-fat           # heuristic baseline (matched budget)
  - cortex-full        # heuristic cortex
  - cortex-llm         # multi-LLM cortex
  - single-llm         # single-LLM direct policy

env_config:
  num_regions: 4
  max_turns: 20
  initial_infected: 10
  noise_level: 0.1

cortex_config:
  total_budget: 30

output_dir: results
trace_dir: traces
