# Full ablation experiment configuration
# Run with: python inference.py --experiment configs/experiment_ablation.yaml

seeds: [42, 43, 44, 45, 46]

conditions:
  - flat-lite
  - flat-fat
  - cortex-lite
  - cortex-full
  - cortex-tuned

env_config:
  num_regions: 9
  max_turns: 50
  initial_infected: 10
  noise_level: 0.1
  telemetry_lag: 1
  reward_weights:
    outcome: 1.0
    timeliness: 0.5
    inner_compute_cost: 0.1
    safety_violations: 1.0
    comms_quality: 0.3

cortex_config:
  total_budget: 50
  perception_cost: 1
  world_modeler_cost: 2
  planner_cost: 2
  critic_cost: 2
  executive_cost: 1
  max_inner_iterations: 10
  memory_enabled: true
  critic_enabled: true

output_dir: results
trace_dir: traces
