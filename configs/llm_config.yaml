# LLM configuration for Cortex roles
# API key: store your HuggingFace token in configs/.hf_token (git-ignored)

hf_token_file: "configs/.hf_token"

models:
  llama-3-8b:
    name: "meta-llama/Meta-Llama-3-8B-Instruct"
    max_tokens: 1024
    temperature: 0.1

  llama-3.1-8b:
    name: "meta-llama/Llama-3.1-8B-Instruct"
    max_tokens: 1024
    temperature: 0.1

  qwen-7b:
    name: "Qwen/Qwen2.5-7B-Instruct"
    max_tokens: 1024
    temperature: 0.1

# Default model for all roles
default_model: llama-3.1-8b

# Per-role model overrides (optional)
# role_models:
#   perception: llama-3-8b       # slightly cheaper
#   planner: qwen-7b             # strong JSON output
#   executive: llama-3.1-8b      # best reasoning
