# LLM experiment: compare heuristic vs LLM cortex
# Run with: python inference.py --experiment configs/experiment_llm.yaml

seeds: [42, 43, 44]

conditions:
  - flat-lite
  - flat-fat
  - cortex-full          # heuristic cortex baseline
  - cortex-llm           # LLM cortex (uses default model from llm_config.yaml)

env_config:
  num_regions: 4
  max_turns: 20          # shorter episodes for faster LLM testing
  initial_infected: 10
  noise_level: 0.1

cortex_config:
  total_budget: 30       # moderate budget

output_dir: results
trace_dir: traces
